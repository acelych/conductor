# example of instruction yaml

# basics
model_yaml_path: /root/workspace/conductor/utils/resources/example/hadaptivenet_s.yaml
# ------ for ./models/*.py or torchvision models ------
# model_yaml_path: "mobilevit_ach,{'num_classes': 100}"
# -----------------------------------------------------
data_yaml_path: /root/workspace/conductor/temp/cifar100.yaml
command: train  # command from cli, indicate the Conductor what to do
task: classify  # task of the model

# training details
epochs: 1
batch_size: 64
device: cuda
world: '[0]'
criterion: CrossEntropyLoss  # below: within default
optimizer: AdamW
scheduler: CosineAnnealingLR
learn_rate: 1e-3
momentum: 0.9
decay: 1e-4
best_metrics: top1_acc

# logging & ckpt details
output_dir: /root/workspace/conductor/temp
ckpt: null