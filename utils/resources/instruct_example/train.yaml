# Example of standard instruction yaml for training

# ==============================================================================
# 1. Basics & Resource Binding
# ==============================================================================
# You can provide the absolute/relative path to a yaml file defining your network topology:
# model_yaml_path: /path/to/conductor/utils/resources/model_example/mobilenetv4_s.yaml
#
# OR dynamically instantiate a built-in PyTorch/torchvision model using string reflection
# Format: model_name,{'kwarg1':value1, ...} (Ensure task: classify is explicitly set)
# model_yaml_path: shufflenet_v2_x1_0,{'num_classes':100}
model_yaml_path: mobilevit,{'num_classes':100,'mode':'xx_small'}

data_yaml_path: /path/to/conductor/data/cifar100.yaml
command: train  # command from cli, indicate the Conductor what to do
task: classify  # task of the model

# ==============================================================================
# 2. Training Details & Hyperparameters
# ==============================================================================
epochs: 200
batch_size: 64
device: cuda
world: '[0]'             # DDP rank list. '[0]' for single GPU; '[0, 1]' for multi-GPU
criterion: CrossEntropyLoss  # below: within default
optimizer: AdamW
scheduler: CosineAnnealingLR
learn_rate: 0.003        # Initial learning rate
momentum: 0.9
decay: 1e-4              # Weight decay
best_metrics: top1_acc   # The metric used to track the best model during training

# ==============================================================================
# 3. Logging & Checkpoint Details
# ==============================================================================
output_dir: ./outputs    # The sandbox directory where outputs and logs will be saved
ckpt: null               # Path to a checkpoint to resume from
